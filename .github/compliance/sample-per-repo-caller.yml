# Open Source Compliance Workflow
# Copy this file to your repo as .github/workflows/compliance.yml
#
# What it does:
#   - Runs compliance checks on push, PR, and daily
#   - Creates/updates a "compliance" issue with a checklist of results
#   - Closes the issue automatically when all checks pass
#
# To fix failures:
#   1. Copy .github/skills/wbg-oss-review/ from open-source-kit to your repo
#   2. Open in VS Code and invoke the wbg-oss-review skill
#      (e.g., "prepare my repo for open source")
#   3. Commit fixes to a branch and create a PR
#
name: Open Source Compliance
on:
  push:
  pull_request:
  schedule: [{ cron: '17 2 * * *' }]
  workflow_dispatch:
    inputs:
      history_depth:
        description: 'Commits to scan for secrets (0 = off)'
        type: number
        default: 0
# Caller declares the SUPERSET of perms the reusable workflow may need.
# The reusable workflow narrows per-job — write scopes land only in the summary job.
permissions:
  contents: read
  security-events: read
  actions: read
  issues: write
  pull-requests: write
jobs:
  run:
    uses: worldbank/open-source-kit/.github/workflows/repo-compliance.yml@main
    with:
      history_depth: ${{ inputs.history_depth || 0 }}
    secrets: inherit
