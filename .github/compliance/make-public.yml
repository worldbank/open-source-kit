name: Pre-Publication Compliance Check
# Run this before manually changing repository visibility to public.
# Performs a deep compliance check including full git history secret scan.
# If all checks pass, the OSPO can approve and change visibility to public in GitHub Settings.
on:
  workflow_dispatch:
    inputs:
      history_depth:
        description: "Commits to scan for secrets (default: full history)"
        default: "999999"
        required: true

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write
  pull-requests: read
  statuses: write
  issues: write

jobs:
  compliance:
    uses: worldbank/open-source-kit/.github/workflows/repo-compliance.yml@main
    with:
      history_depth: ${{ github.event.inputs.history_depth }}
    secrets: inherit

