name: Repo Compliance
# Prerequisites:
#   - Enable Dependabot org-wide: Settings > Code security > Dependabot alerts
#   - The dependencies job queries Dependabot Alerts API (free tier)
#   - Secret scanning: queries GitHub Secret Scanning API (public); TruffleHog fallback (private)
#   - Code quality (linting): local linters or Super-Linter fallback
#   - Code quality (CodeQL): queries GitHub Code Scanning API (public); skipped for private repos
#   - Native GitHub features (Secret Scanning, Dependabot, CodeQL) are queried, not duplicated
on:
  workflow_call:
    inputs:
      history_depth:
        description: "Secret scan depth (commits); 0 = no history scan"
        type: number
        default: 0
    secrets:
      DEPENDABOT_TOKEN:
        description: "PAT with Dependabot alerts read permission"
        required: false

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write
  pull-requests: read
  statuses: write
  issues: write

jobs:
  # --- License via GitHub API (whitelist MIT/Apache-2.0) + WB IGO Riders ---
  license:
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.set-outcome.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: License from GitHub API
        id: gh-license
        uses: actions/github-script@v7
        with:
          script: |
            const meta = await github.rest.repos.get(context.repo);
            core.setOutput("spdx", meta.data.license?.spdx_id || "");
      - name: Enforce whitelist
        id: whitelist
        continue-on-error: true
        run: |
          SPDX="${{ steps.gh-license.outputs.spdx }}"
          echo "Detected SPDX: ${SPDX:-<none>}"
          case "$SPDX" in
            MIT|Apache-2.0) echo "Whitelisted license: $SPDX" ;;
            "") echo "::error::License missing or undetected"; exit 1 ;;
            *) echo "::error::Non-whitelisted license: $SPDX"; exit 1 ;;
          esac
      - name: Check WB IGO Rider (required for MIT)
        id: rider-mit
        if: steps.gh-license.outputs.spdx == 'MIT'
        continue-on-error: true
        run: |
          RIDER_FILE="WB-IGO-RIDER.md"
          CANONICAL_URL="https://raw.githubusercontent.com/worldbank/.github/main/WB-IGO-RIDER.md"

          if [ ! -f "$RIDER_FILE" ]; then
            echo "::error::MIT license requires WB-IGO-RIDER.md file. See: https://github.com/worldbank/.github/blob/main/WB-IGO-RIDER.md"
            exit 1
          fi

          echo "Checking rider content matches canonical version..."
          curl -sSfL "$CANONICAL_URL" -o /tmp/canonical-rider.md

          if ! diff -q "$RIDER_FILE" /tmp/canonical-rider.md >/dev/null 2>&1; then
            echo "::error::WB-IGO-RIDER.md content does not match canonical version at $CANONICAL_URL"
            echo "::group::Diff"
            diff "$RIDER_FILE" /tmp/canonical-rider.md || true
            echo "::endgroup::"
            exit 1
          fi

          echo "WB IGO Rider present and matches canonical version"
      - name: Check WB IGO Apache Rider (required for Apache-2.0)
        id: rider-apache
        if: steps.gh-license.outputs.spdx == 'Apache-2.0'
        continue-on-error: true
        run: |
          RIDER_FILE="WB-IGO-RIDER-APACHE.md"
          CANONICAL_URL="https://raw.githubusercontent.com/worldbank/.github/main/WB-IGO-RIDER-APACHE.md"

          if [ ! -f "$RIDER_FILE" ]; then
            echo "::error::Apache-2.0 license requires WB-IGO-RIDER-APACHE.md file. See: https://github.com/worldbank/.github/blob/main/WB-IGO-RIDER-APACHE.md"
            exit 1
          fi

          echo "Checking rider content matches canonical version..."
          curl -sSfL "$CANONICAL_URL" -o /tmp/canonical-rider.md

          if ! diff -q "$RIDER_FILE" /tmp/canonical-rider.md >/dev/null 2>&1; then
            echo "::error::WB-IGO-RIDER-APACHE.md content does not match canonical version at $CANONICAL_URL"
            echo "::group::Diff"
            diff "$RIDER_FILE" /tmp/canonical-rider.md || true
            echo "::endgroup::"
            exit 1
          fi

          echo "WB IGO Rider present and matches canonical version"
      - name: Set outcome
        id: set-outcome
        if: always()
        run: |
          if [ "${{ steps.whitelist.outcome }}" = "failure" ] || \
             [ "${{ steps.rider-mit.outcome }}" = "failure" ] || \
             [ "${{ steps.rider-apache.outcome }}" = "failure" ]; then
            echo "result=failure" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
          fi

  # --- README checks ---
  readme:
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.set-outcome.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: worldbank/open-source-kit
          path: .compliance
          sparse-checkout: .github/compliance
      - run: npm i -g markdownlint-cli
      - name: Lint README
        id: lint
        continue-on-error: true
        run: |
          test -f README.md || { echo "::error::Missing README.md"; exit 1; }
          markdownlint README.md || true
      - name: Content checks
        id: content
        continue-on-error: true
        run: python3 .compliance/.github/compliance/check_readme.py
      - name: Set outcome
        id: set-outcome
        if: always()
        run: |
          if [ "${{ steps.lint.outcome }}" = "failure" ] || \
             [ "${{ steps.content.outcome }}" = "failure" ]; then
            echo "result=failure" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
          fi

  # --- Languages via GitHub API + framework detection script ---
  tech-stack:
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.langs.outputs.languages }}
      frameworks: ${{ steps.detect.outputs.frameworks }}
      # languages comes from GitHub API, frameworks from detect_stack.py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: worldbank/open-source-kit
          path: .compliance
          sparse-checkout: .github/compliance
      - name: GitHub Languages API
        id: langs
        uses: actions/github-script@v7
        with:
          script: |
            const r = await github.rest.repos.listLanguages(context.repo);
            core.setOutput("languages", JSON.stringify(r.data || {}));
      - name: Print languages
        run: echo '${{ steps.langs.outputs.languages }}'
      - name: Framework/manifest detection
        id: detect
        run: python3 .compliance/.github/compliance/detect_stack.py

  # --- Secrets: query native Secret Scanning API (public); TruffleHog fallback (private) ---
  secrets:
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.route.outputs.source }}
      outcome: ${{ steps.set-outcome.outputs.result }}
    steps:
      - name: Determine scan strategy
        id: route
        uses: actions/github-script@v7
        with:
          script: |
            const meta = await github.rest.repos.get(context.repo);
            const vis = meta.data.visibility;
            core.setOutput('visibility', vis);
            core.setOutput('source', vis === 'public' ? 'github-api' : 'trufflehog');
            core.info(`Repo visibility: ${vis}`);

      # --- Public repos: query GitHub Secret Scanning Alerts API ---
      - name: Query Secret Scanning API
        id: scan-api
        if: steps.route.outputs.visibility == 'public'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              const alerts = await github.rest.secretScanning.listAlertsForRepo({
                owner, repo, state: 'open', per_page: 100
              });

              core.summary.addHeading('Secret Scanning Alerts (GitHub native)', 2);

              if (alerts.data.length === 0) {
                core.summary.addRaw('✅ No open secret scanning alerts\n');
                await core.summary.write();
                core.info('No open secret scanning alerts');
                return;
              }

              const items = alerts.data.slice(0, 10).map(a =>
                `**${a.secret_type_display_name}** — ${a.state} (created ${a.created_at.substring(0, 10)})`
              );
              core.summary.addList(items);
              if (alerts.data.length > 10) {
                core.summary.addRaw(`...and ${alerts.data.length - 10} more\n`);
              }
              core.summary.addLink('View all alerts', `https://github.com/${owner}/${repo}/security/secret-scanning`);
              await core.summary.write();

              core.setFailed(`Found ${alerts.data.length} open secret scanning alerts. Review: https://github.com/${owner}/${repo}/security/secret-scanning`);
            } catch (e) {
              if (e.status === 404) {
                core.warning('Secret scanning not available for this repo. Enable at: Settings > Code security > Secret scanning');
              } else {
                throw e;
              }
            }

      # --- Private repos: TruffleHog scan (native secret scanning requires GHAS) ---
      - uses: actions/checkout@v4
        if: steps.route.outputs.visibility != 'public'
        with: { fetch-depth: 0 }
      - name: TruffleHog scan
        id: trufflehog
        if: steps.route.outputs.visibility != 'public'
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true
      - name: TruffleHog deep history scan
        if: steps.route.outputs.visibility != 'public' && inputs.history_depth > 0
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          trufflehog git file://. --no-update --json > trufflehog-results.json 2>/dev/null || true
          if [ -s trufflehog-results.json ]; then
            echo "::warning::Potential secrets found in git history"
            cat trufflehog-results.json | head -50
          else
            echo "No secrets found in history scan"
          fi
      - name: Set outcome
        id: set-outcome
        if: always()
        run: |
          if [ "${{ steps.scan-api.outcome }}" = "failure" ] || \
             [ "${{ steps.trufflehog.outcome }}" = "failure" ]; then
            echo "result=failure" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
          fi

  # --- Data file scan (warn/fail per policy) ---
  data-files:
    runs-on: ubuntu-latest
    outputs:
      detected: ${{ steps.check.outputs.detected }}
      count: ${{ steps.check.outputs.count }}
      outcome: ${{ steps.set-outcome.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: worldbank/open-source-kit
          path: .compliance
          sparse-checkout: .github/compliance
      - name: Check data files
        id: check
        continue-on-error: true
        run: python3 .compliance/.github/compliance/check_data_files.py
      - name: Set outcome
        id: set-outcome
        if: always()
        run: |
          if [ "${{ steps.check.outcome }}" = "failure" ]; then
            echo "result=failure" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
          fi

  # --- AI usage hints (informational) ---
  ai-usage:
    runs-on: ubuntu-latest
    outputs:
      detected: ${{ steps.detect.outputs.detected }}
      files: ${{ steps.detect.outputs.files }}
      outcome: ${{ steps.set-outcome.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: worldbank/open-source-kit
          path: .compliance
          sparse-checkout: .github/compliance
      - name: Detect AI usage
        id: detect
        continue-on-error: true
        run: python3 .compliance/.github/compliance/detect_ai_use.py
      - name: Set outcome
        id: set-outcome
        if: always()
        run: |
          if [ "${{ steps.detect.outcome }}" = "failure" ]; then
            echo "result=failure" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
          fi

  # --- Dependency security via Dependabot API (free) ---
  # Requires Dependabot to be enabled org-wide
  dependencies:
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.set-outcome.outputs.result }}
    steps:
      - id: dep-check
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          DEPENDABOT_TOKEN: ${{ secrets.DEPENDABOT_TOKEN }}
        with:
          github-token: ${{ secrets.DEPENDABOT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              const alerts = await github.rest.dependabot.listAlertsForRepo({
                owner, repo, state: 'open', per_page: 100
              });

              const critical = alerts.data.filter(a => a.security_vulnerability?.severity === 'critical');
              const high = alerts.data.filter(a => a.security_vulnerability?.severity === 'high');
              const medium = alerts.data.filter(a => a.security_vulnerability?.severity === 'medium');
              const low = alerts.data.filter(a => a.security_vulnerability?.severity === 'low');

              // Build summary table
              core.summary.addHeading('Dependabot Security Alerts', 2);
              core.summary.addTable([
                [{ data: 'Severity', header: true }, { data: 'Count', header: true }],
                ['🔴 Critical', String(critical.length)],
                ['🟠 High', String(high.length)],
                ['🟡 Medium', String(medium.length)],
                ['🟢 Low', String(low.length)]
              ]);

              // List critical and high alerts
              if (critical.length + high.length > 0) {
                core.summary.addHeading('Critical & High Severity', 3);
                const items = [...critical, ...high].slice(0, 10).map(a =>
                  `**${a.dependency.package.name}** (${a.dependency.package.ecosystem}): ${a.security_advisory.summary}`
                );
                core.summary.addList(items);
                core.summary.addLink('View all alerts', `https://github.com/${owner}/${repo}/security/dependabot`);
              }

              await core.summary.write();

              // Fail on critical/high
              if (critical.length > 0 || high.length > 0) {
                core.setFailed(`Found ${critical.length} critical and ${high.length} high severity vulnerabilities. Review: https://github.com/${owner}/${repo}/security/dependabot`);
              } else if (alerts.data.length > 0) {
                core.warning(`Found ${alerts.data.length} open Dependabot alerts (no critical/high)`);
              } else {
                core.info('✅ No open Dependabot alerts');
              }
            } catch (e) {
              if (e.status === 404 || e.status === 403) {
                core.warning('Dependabot alerts not accessible. Enable at: Settings > Code security > Dependabot alerts');
              } else {
                throw e;
              }
            }
      - name: Set outcome
        id: set-outcome
        if: always()
        run: |
          if [ "${{ steps.dep-check.outcome }}" = "failure" ]; then
            echo "result=failure" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
          fi

  # --- Code quality/security: prefer local linters; fallback to Super-Linter ---
  code-quality-basic:
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.set-outcome.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect & run local linters
        id: local
        continue-on-error: true
        run: |
          set -e
          found=0
          if [ -f "package.json" ] && jq -e '.devDependencies.eslint or .dependencies.eslint' package.json >/dev/null; then
            echo "eslint found"
            if [ -f "package-lock.json" ]; then npm ci; else npm install; fi
            npx eslint . 2>&1 || true
            found=1
          fi
          if [ -f "pyproject.toml" ] && grep -q "\[tool.ruff\]" pyproject.toml; then
            echo "ruff config found"; pip install ruff; ruff check .; found=1
          elif [ -f ".flake8" ] || ( [ -f "setup.cfg" ] && grep -q "\[flake8\]" setup.cfg ); then
            echo "flake8 config found"; pip install flake8; flake8 .; found=1
          fi
          if [ $found -eq 0 ]; then echo "fallback=true" >> $GITHUB_OUTPUT; fi

      - name: Super-Linter fallback
        id: superlinter
        if: steps.local.outputs.fallback == 'true'
        continue-on-error: true
        uses: github/super-linter/slim@v6
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only enable essential linters
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_PYTHON_FLAKE8: true
      - name: Set outcome
        id: set-outcome
        if: always()
        run: |
          if [ "${{ steps.local.outcome }}" = "failure" ] || \
             [ "${{ steps.superlinter.outcome }}" = "failure" ]; then
            echo "result=failure" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
          fi

  # --- Summary: Create/update issue for failed checks (default branch only) ---
  summary:
    runs-on: ubuntu-latest
    needs: [license, readme, tech-stack, secrets, data-files, ai-usage, dependencies, code-quality-basic]
    if: always() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const sha = context.sha.substring(0, 7);
            const issueTitle = `Open Source Compliance Check: ${repo}`;

            // --- Query native GitHub security APIs (public repos) ---
            const repoMeta = await github.rest.repos.get(context.repo);
            const isPublic = repoMeta.data.visibility === 'public';

            // Query Code Scanning (CodeQL) alerts — public repos only
            let codeqlStatus = 'skipped';
            let codeqlSummary = 'Private repo — CodeQL activates once public';
            if (isPublic) {
              try {
                const csAlerts = await github.rest.codeScanning.listAlertsForRepo({
                  owner, repo, state: 'open', per_page: 100
                });
                const critical = csAlerts.data.filter(a => a.rule?.security_severity_level === 'critical');
                const high = csAlerts.data.filter(a => a.rule?.security_severity_level === 'high');
                if (critical.length > 0 || high.length > 0) {
                  codeqlStatus = 'failure';
                  codeqlSummary = `${critical.length} critical, ${high.length} high severity alerts`;
                } else if (csAlerts.data.length > 0) {
                  codeqlStatus = 'success';
                  codeqlSummary = `${csAlerts.data.length} open alerts (no critical/high)`;
                } else {
                  codeqlStatus = 'success';
                  codeqlSummary = 'No open alerts';
                }
              } catch (e) {
                if (e.status === 404 || e.status === 403) {
                  codeqlStatus = 'skipped';
                  codeqlSummary = 'Code scanning not configured — enable default setup in Settings > Code security';
                } else {
                  codeqlStatus = 'skipped';
                  codeqlSummary = `API error: ${e.message}`;
                }
              }
            }

            // Job results from outcome outputs (actual results, not masked by continue-on-error)
            // Falls back to needs.X.result if output is missing (e.g., job was cancelled)
            const jobs = {
              'License': '${{ needs.license.outputs.outcome }}' || '${{ needs.license.result }}',
              'README': '${{ needs.readme.outputs.outcome }}' || '${{ needs.readme.result }}',
              'Secrets': '${{ needs.secrets.outputs.outcome }}' || '${{ needs.secrets.result }}',
              'Data Files': '${{ needs.data-files.outputs.outcome }}' || '${{ needs.data-files.result }}',
              'Dependencies': '${{ needs.dependencies.outputs.outcome }}' || '${{ needs.dependencies.result }}',
              'Code Quality (Basic)': '${{ needs.code-quality-basic.outputs.outcome }}' || '${{ needs.code-quality-basic.result }}',
              'Code Quality (CodeQL)': codeqlStatus
            };

            // Optional checks: failures here are shown but don't block issue closure
            const optionalChecks = new Set([
              'Code Quality (Basic)',
              'Code Quality (CodeQL)'
            ]);

            // Checks that come from API queries rather than CI jobs
            const apiChecks = new Set([
              'Code Quality (CodeQL)'
            ]);

            // Get job URLs from workflow run
            const { data: workflowJobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id: runId
            });

            // For reusable workflows, job names are prefixed (e.g., "run / license")
            // Match by checking if job name ends with the target name
            const findJobUrl = (targetName) => {
              const job = workflowJobs.jobs.find(j =>
                j.name === targetName || j.name.endsWith(` / ${targetName}`)
              );
              return job?.html_url || `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            };

            // Map display names to job names in workflow
            const jobNameMap = {
              'License': 'license',
              'README': 'readme',
              'Secrets': 'secrets',
              'Data Files': 'data-files',
              'Dependencies': 'dependencies',
              'Code Quality (Basic)': 'code-quality-basic'
            };

            // Links for API-queried checks (not CI jobs)
            const apiCheckLinks = {
              'Code Quality (CodeQL)': isPublic
                ? `https://github.com/${owner}/${repo}/security/code-scanning`
                : `https://github.com/${owner}/${repo}/settings/security_analysis`
            };

            // Build checklist
            const statusIcon = (result) => {
              switch (result) {
                case 'success': return '🟢';
                case 'failure': return '🔴';
                case 'skipped': return '⚪';
                case 'cancelled': return '🟠';
                default: return '❓';
              }
            };

            let hasFailures = false;
            let checklistItems = [];

            for (const [name, result] of Object.entries(jobs)) {
              const icon = statusIcon(result);
              const isOptional = optionalChecks.has(name);
              const isApi = apiChecks.has(name);
              const label = isOptional ? ` *(optional)*` : '';

              // For API-queried checks, link to the GitHub security tab; for CI jobs, link to the job run
              let url;
              if (isApi) {
                url = apiCheckLinks[name];
              } else {
                const jobName = jobNameMap[name];
                url = findJobUrl(jobName);
              }

              if (result === 'failure' || result === 'skipped') {
                if (!isOptional) {
                  hasFailures = true;
                }
                checklistItems.push(`- [ ] ${icon} **[${name}](${url})** - ${result}${label}`);
              } else {
                checklistItems.push(`- [x] ${icon} **[${name}](${url})** - ${result}${label}`);
              }
            }

            // Tech stack detection results
            const languages = '${{ needs.tech-stack.outputs.languages }}' || '{}';
            const frameworks = '${{ needs.tech-stack.outputs.frameworks }}' || '[]';
            let langList = [];
            try {
              const langObj = JSON.parse(languages);
              langList = Object.keys(langObj);
            } catch (e) { langList = []; }
            let frameworkList = [];
            try {
              frameworkList = JSON.parse(frameworks);
            } catch (e) { frameworkList = []; }

            // AI usage detection results
            const aiDetected = '${{ needs.ai-usage.outputs.detected }}' === 'true';
            const aiFiles = '${{ needs.ai-usage.outputs.files }}' || '[]';
            let aiFileList = [];
            try {
              aiFileList = JSON.parse(aiFiles);
            } catch (e) { aiFileList = []; }

            // Data files detection results
            const dataFiles = '${{ needs.data-files.outputs.detected }}' || '[]';
            const dataCount = parseInt('${{ needs.data-files.outputs.count }}' || '0');
            let dataFileList = [];
            try {
              dataFileList = JSON.parse(dataFiles);
            } catch (e) { dataFileList = []; }

            // Build informational content
            let infoContent = [];
            infoContent.push(`- **Languages:** ${langList.length > 0 ? langList.join(', ') : 'None detected'}`);
            infoContent.push(`- **Frameworks:** ${frameworkList.length > 0 ? frameworkList.join(', ') : 'None detected'}`);
            infoContent.push(`- **AI Usage:** ${aiDetected ? aiFileList.slice(0, 5).map(f => '\`' + f + '\`').join(', ') + (aiFileList.length > 5 ? '...' : '') : 'Not detected'}`);
            if (dataCount > 0) {
              infoContent.push(`- **Data Files (${dataCount}):** ${dataFileList.slice(0, 5).map(f => '\`' + f + '\`').join(', ')}${dataCount > 5 ? '...' : ''}`);
              infoContent.push(`  - ⚠️ *Please verify these files should be in the repo and not deposited in a data catalog*`);
            } else {
              infoContent.push(`- **Data Files:** None detected`);
            }

            // GitHub native integration status
            const secretsSource = '${{ needs.secrets.outputs.source }}' || 'unknown';
            infoContent.push('');
            infoContent.push(`**GitHub Native Integration**`);
            infoContent.push(`- **Secret Scanning:** ${secretsSource === 'github-api' ? 'Using GitHub Secret Scanning API' : 'Using TruffleHog (private repo)'}`);
            infoContent.push(`- **Dependabot:** Using Dependabot Alerts API`);
            infoContent.push(`- **CodeQL:** ${codeqlSummary}`);

            const body = `## Compliance Check Results

            **Commit:** \`${sha}\`
            **Run:** [#${runId}](https://github.com/${owner}/${repo}/actions/runs/${runId})
            **Updated:** ${new Date().toISOString()}

            ### Checklist

            ${checklistItems.join('\n')}

            ### Informational

            ${infoContent.join('\n')}

            ---
            *This issue is auto-managed by the [open source compliance workflow](https://github.com/${owner}/${repo}/actions/workflows/compliance.yml). Click on each item to review details. Push to the default branch to re-run checks and update the checklist. Issue closes when all required checks pass (code quality checks are optional).*
            `.replace(/^            /gm, '');

            // Search for existing issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo,
              state: 'all',
              labels: 'compliance',
              per_page: 10
            });

            const existingIssue = issues.find(i => i.title === issueTitle);

            if (hasFailures) {
              if (existingIssue) {
                // Update existing issue
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: existingIssue.number,
                  body,
                  state: 'open'
                });
                core.info(`Updated issue #${existingIssue.number}`);
              } else {
                // Create new issue
                await github.rest.issues.create({
                  owner, repo,
                  title: issueTitle,
                  body,
                  labels: ['compliance']
                });
                core.info('Created new compliance issue');
              }
            } else {
              // All passed - close issue if exists
              if (existingIssue && existingIssue.state === 'open') {
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: existingIssue.number,
                  body,
                  state: 'closed',
                  state_reason: 'completed'
                });
                core.info(`Closed issue #${existingIssue.number} - all checks passed`);
              } else {
                core.info('All checks passed, no issue to update');
              }
            }
